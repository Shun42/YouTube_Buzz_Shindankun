name: NLP processing

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  nlp-processing:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-actions.txt

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y mecab libmecab-dev mecab-ipadic-utf8

      - name: Install Python dependencies
        run: python -m pip install -r requirements-actions.txt

      - name: Run NLP processing
        run: python backend/run_nlp_processing.py

      - name: Upload generated data
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: nlp-processing-data
          path: |
            backend/data/youtube.db
            backend/data/*.csv
            backend/data/*.xlsx
          if-no-files-found: warn

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/data/youtube.db
          git diff --cached --quiet || git commit -m "Update NLP processed database"
          git push
