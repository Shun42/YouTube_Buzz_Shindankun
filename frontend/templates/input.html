<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YOUTUBEバズ診断くん</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/input_style.css') }}">
</head>
<body>
  <main class="container">
    <div class="badge">PORTFOLIO TOOL</div>

    <h1>YOUTUBEバズ診断くん</h1>

    <p class="description">
      YouTube動画のデータを収集・分析し、バズ要因を可視化する分析ツールです。
    </p>

    <form action="/run" method="POST">
      <label for="mode">Analysis Mode</label>

      <select id="mode" name="mode">
        <option value="analyze">分析</option>
        <option value="collect">データ収集</option>
        <option value="NLP_analyze">NLP分析</option>
      </select>

      <div id="collectionModeField" class="collection-mode-field is-hidden">
        <label for="collection_mode">Collection Mode</label>
        <select id="collection_mode" name="collection_mode" disabled>
          <option value="short">短縮モード</option>
          <option value="normal" selected>通常モード</option>
        </select>
      </div>

      <button id="triggerButton" type="submit">Run Analysis</button>
    </form>
    <div class="features">
      <div>・再生数、コメント、字幕の分析</div>
      <div>・NLPによる強い言葉の抽出</div>
      <div>・バズ要因のスコアリング</div>
      <div>を行い、再生数を説明します。</div>
    </div>
    <p class="footer-text">
      Python / Flask / YouTube Data API / NLP
    </p>
  </main>
  <script>
    const modeSelect = document.getElementById("mode");
    const collectionModeField = document.getElementById("collectionModeField");
    const collectionModeSelect = document.getElementById("collection_mode");

    function updateCollectionModeVisibility() {
      const isCollectMode = modeSelect.value === "collect";
      collectionModeField.classList.toggle("is-hidden", !isCollectMode);
      collectionModeSelect.disabled = !isCollectMode;
    }

    modeSelect.addEventListener("change", updateCollectionModeVisibility);
    updateCollectionModeVisibility();
  </script>
</body>
</html>
